name: Automated Custom Kernel Build

on:
  schedule:
    - cron: '0 0 * * *' # Automatically checks every day at midnight UTC
  workflow_dispatch:     # Allows manual trigger anytime

permissions:
  contents: write       # Grants permission to save the version state file and create releases

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - name: Bootstrap Git, CLI, and Dependencies inside Container
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm git base-devel devtools pacman-contrib ccache sudo github-cli jq curl

    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check GitHub API for New Upstream Release
      id: check
      run: |
        # Fetch the latest tag name from archlinux/linux
        LATEST_TAG=$(curl -s https://api.github.com/repos/archlinux/linux/tags | jq -r '.[0].name')
        echo "Latest upstream tag: $LATEST_TAG"
        
        # Read the last built tag stored in your repo
        touch .last_release
        LOCAL_TAG=$(cat .last_release)
        echo "Last built local tag: '$LOCAL_TAG'"
        
        if [ "$LATEST_TAG" = "$LOCAL_TAG" ]; then
          echo "Result: Upstream matches local. Skipping build."
          echo "should_build=false" >> $GITHUB_OUTPUT
        else
          echo "Result: New release detected! Proceeding..."
          echo "should_build=true" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
        fi

    - name: Configure Build User
      if: steps.check.outputs.should_build == 'true'
      run: |
        useradd -m builder
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        chown -R builder:builder "$GITHUB_WORKSPACE"

    - name: Setup Cache for ccache
      if: steps.check.outputs.should_build == 'true'
      uses: actions/cache@v4
      with:
        path: /home/builder/.cache/ccache
        key: ${{ runner.os }}-kernel-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-kernel-ccache-

    - name: Clone, Rename, Configure, and Build Package
      if: steps.check.outputs.should_build == 'true'
      run: |
        sudo -u builder bash << 'EOF'
        set -ex
        
        echo "=== Setting Environment Variables & Limits ==="
        export MAKEFLAGS="-j$(nproc)"
        export MCFLAGS="-j$(nproc)"
        export CC="ccache gcc"
        ccache --max-size=2G
        
        # Disable Arch's default debug package generation to save disk space
        sudo sed -i 's/ debug / !debug /g' /etc/makepkg.conf
        
        echo "=== Step 1: Clone official linux kernel package repo ==="
        pkgctl repo clone --protocol=https linux
        cd linux
        
        echo "=== Step 2: Rename the package base name ==="
        sed -i 's/^pkgbase=linux$/pkgbase=linux-btrfs/' PKGBUILD
        echo "  -> Successfully renamed pkgbase in PKGBUILD"
        
        echo "=== Step 3: Strip out documentation building and packaging ==="
        sed -i '/make htmldocs/d' PKGBUILD
        sed -i '/wait "${pid_docs}"/d' PKGBUILD
        sed -i 's/"$pkgbase-docs"//g' PKGBUILD
        echo "  -> Successfully stripped documentation build steps"

        echo "=== Step 4: Modify the Arch kernel config file (config.x86_64) ==="
        sed -i \
          -e 's/CONFIG_BLK_DEV_NVME=./CONFIG_BLK_DEV_NVME=y/' \
          -e 's/CONFIG_BTRFS_FS=./CONFIG_BTRFS_FS=y/' \
          -e 's/CONFIG_LIBCRC32C=./CONFIG_LIBCRC32C=y/' \
          -e 's/CONFIG_CRC32=./CONFIG_CRC32=y/' \
          -e 's/CONFIG_CRYPTO_SHA256=./CONFIG_CRYPTO_SHA256=y/' \
          -e 's/CONFIG_CRYPTO_BLAKE2B=./CONFIG_CRYPTO_BLAKE2B=y/' \
          -e 's/CONFIG_ZLIB_INFLATE=./CONFIG_ZLIB_INFLATE=y/' \
          -e 's/CONFIG_ZLIB_DEFLATE=./CONFIG_ZLIB_DEFLATE=y/' \
          -e 's/CONFIG_ZSTD_COMPRESS=./CONFIG_ZSTD_COMPRESS=y/' \
          -e 's/CONFIG_ZSTD_DECOMPRESS=./CONFIG_ZSTD_DECOMPRESS=y/' \
          -e 's/CONFIG_DEBUG_INFO=y/# CONFIG_DEBUG_INFO is not set/' \
          -e 's/CONFIG_DEBUG_INFO_BTF=y/# CONFIG_DEBUG_INFO_BTF is not set/' \
          -e 's/CONFIG_DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT=y/# CONFIG_DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT is not set/' \
          -e 's/# CONFIG_DEBUG_INFO_NONE is not set/CONFIG_DEBUG_INFO_NONE=y/' \
          config.x86_64
        echo "  -> Successfully modified config.x86_64 and stripped ALL debug info"
        
        echo "=== Step 5: Update local checksums for the modified config ==="
        updpkgsums
        
        echo "=== Step 6: Compile package and resolve dependencies ==="
        makepkg --skippgpcheck --syncdeps --noconfirm
        EOF

    - name: Save Version State back to Repo
      if: steps.check.outputs.should_build == 'true'
      run: |
        git config --global --add safe.directory '*'
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        echo "${{ steps.check.outputs.latest_tag }}" > .last_release
        git add .last_release
        git diff-index --quiet HEAD || git commit -m "Automated: Update tracked kernel tag to ${{ steps.check.outputs.latest_tag }}"
        git push

    - name: Create GitHub Release and Upload Packages
      if: steps.check.outputs.should_build == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global --add safe.directory '*'
        TAG_NAME="${{ steps.check.outputs.latest_tag }}"
        
        gh release create "$TAG_NAME" linux/*.pkg.tar.zst \
          --title "Kernel Release $TAG_NAME" \
          --notes "Automated optimized custom build of the Arch Linux kernel package flavor \`linux-btrfs\`." \
          --clobber

    - name: Log and Display Finished Kernel Version
      if: steps.check.outputs.should_build == 'true'
      run: |
        PKGVER=$(grep -E '^pkgver=' linux/PKGBUILD | cut -d= -f2)
        PKGREL=$(grep -E '^pkgrel=' linux/PKGBUILD | cut -d= -f2)
        OFFICIAL_VERSION="${PKGVER}-${PKGREL}"

        echo "## 🚀 Custom Kernel Build Complete" >> $GITHUB_STEP_SUMMARY
        echo "The workflow finished building and packaging your optimization modifications successfully." >> $GITHUB_STEP_SUMMARY
        echo "- **Kernel package flavor:** \`linux-btrfs\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Official Upstream Version:** \`$OFFICIAL_VERSION\`" >> $GITHUB_STEP_SUMMARY
