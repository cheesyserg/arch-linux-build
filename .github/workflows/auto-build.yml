name: Automated Custom Kernel Build

on:
  schedule:
    - cron: '0 0 * * *' # Automatically checks every day at midnight UTC
  workflow_dispatch:     # Allows manual trigger anytime

permissions:
  contents: write       # Grants permission to save the version state file and create releases

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      latest_tag: ${{ steps.check.outputs.latest_tag }}
    steps:
    - name: Checkout Your Repo
      uses: actions/checkout@v4

    - name: Check GitHub API for New Upstream Release
      id: check
      run: |
        LATEST_TAG=$(curl -s https://api.github.com/repos/archlinux/linux/tags | jq -r '.[0].name')
        echo "Latest upstream tag: $LATEST_TAG"
        
        touch .last_release
        LOCAL_TAG=$(cat .last_release)
        echo "Last built local tag: '$LOCAL_TAG'"
        
        if [ "$LATEST_TAG" = "$LOCAL_TAG" ]; then
          echo "Result: Upstream matches local. Skipping build."
          echo "should_build=false" >> $GITHUB_OUTPUT
        else
          echo "Result: New release detected! Proceeding..."
          echo "should_build=true" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
        fi

  build-kernel:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Free Disk Space (Strip Ubuntu Host Bloat)
      run: |
        echo "=== Disk Space Before Cleanup ==="
        df -h
        
        # Remove massive pre-installed tools, language runtimes, and SDKs
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        
        echo "=== Disk Space After Cleanup ==="
        df -h

    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Cache for ccache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: ${{ runner.os }}-kernel-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-kernel-ccache-

    - name: Run Build inside Arch Container
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        LATEST_TAG: ${{ needs.check-version.outputs.latest_tag }}
        GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
      run: |
        # Ensure host cache directories exist and are writable by the container user
        mkdir -p ${{ github.workspace }}/.ccache
        chmod -R 777 ${{ github.workspace }}/.ccache

        docker run --rm \
          -v ${{ github.workspace }}/.ccache:/home/builder/.cache/ccache \
          -v ${{ github.workspace }}:/workspace \
          -v $GITHUB_STEP_SUMMARY:$GITHUB_STEP_SUMMARY \
          -w /workspace \
          -e GH_TOKEN=$GH_TOKEN \
          -e LATEST_TAG=$LATEST_TAG \
          -e GITHUB_STEP_SUMMARY=$GITHUB_STEP_SUMMARY \
          archlinux:latest bash -c '
            set -ex
            
            echo "=== Step 1: Bootstrap Dependencies ==="
            pacman -Syu --noconfirm
            pacman -S --noconfirm git base-devel devtools pacman-contrib ccache sudo github-cli
            pacman -Scc --noconfirm
            
            echo "=== Step 2: Configure Build User ==="
            useradd -m builder
            echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            chown -R builder:builder /home/builder/.cache/ccache
            chown -R builder:builder /workspace
            
            echo "=== Step 3: Clone, Rename, Configure, and Build Package ==="
            sudo -u builder bash << "EOF"
            set -ex
            export MAKEFLAGS="-j$(nproc)"
            export MCFLAGS="-j$(nproc)"
            export CC="ccache gcc"
            
            pkgctl repo clone --protocol=https linux
            cd linux
            
            sed -i "s/^pkgbase=linux$/pkgbase=linux-btrfs/" PKGBUILD
            echo "  -> Successfully renamed pkgbase in PKGBUILD"
            
            sed -i "/make htmldocs/d" PKGBUILD
            sed -i "/wait \"\${pid_docs}\"/d" PKGBUILD
            sed -i "s/\"\$pkgbase-docs\"//g" PKGBUILD
            echo "  -> Successfully stripped documentation build steps"

            sed -i \
              -e "s/CONFIG_BLK_DEV_NVME=./CONFIG_BLK_DEV_NVME=y/" \
              -e "s/CONFIG_BTRFS_FS=./CONFIG_BTRFS_FS=y/" \
              -e "s/CONFIG_LIBCRC32C=./CONFIG_LIBCRC32C=y/" \
              -e "s/CONFIG_CRC32=./CONFIG_CRC32=y/" \
              -e "s/CONFIG_CRYPTO_SHA256=./CONFIG_CRYPTO_SHA256=y/" \
              -e "s/CONFIG_CRYPTO_BLAKE2B=./CONFIG_CRYPTO_BLAKE2B=y/" \
              -e "s/CONFIG_ZLIB_INFLATE=./CONFIG_ZLIB_INFLATE=y/" \
              -e "s/CONFIG_ZLIB_DEFLATE=./CONFIG_ZLIB_DEFLATE=y/" \
              -e "s/CONFIG_ZSTD_COMPRESS=./CONFIG_ZSTD_COMPRESS=y/" \
              -e "s/CONFIG_ZSTD_DECOMPRESS=./CONFIG_ZSTD_DECOMPRESS=y/" \
              config.x86_64
            echo "  -> Successfully modified config.x86_64 (Debug Info Intact)"
            
            updpkgsums
            makepkg --skippgpcheck --syncdeps --noconfirm
        EOF
            
            echo "=== Step 4: Save Version State back to Repo ==="
            git config --global --add safe.directory "*"
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            echo "$LATEST_TAG" > .last_release
            git add .last_release
            git diff-index --quiet HEAD || git commit -m "Automated: Update tracked kernel tag to $LATEST_TAG"
            git push
            
            echo "=== Step 5: Create GitHub Release and Upload Packages ==="
            gh release create "$LATEST_TAG" linux/*.pkg.tar.zst \
              --title "Kernel Release $LATEST_TAG" \
              --notes "Automated optimized custom build of the Arch Linux kernel package flavor \`linux-btrfs\`." \
              --clobber

            echo "=== Step 6: Log Summary ==="
            PKGVER=$(grep -E "^pkgver=" linux/PKGBUILD | cut -d= -f2)
            PKGREL=$(grep -E "^pkgrel=" linux/PKGBUILD | cut -d= -f2)
            OFFICIAL_VERSION="${PKGVER}-${PKGREL}"

            echo "## 🚀 Custom Kernel Build Complete" >> $GITHUB_STEP_SUMMARY
            echo "The workflow finished building and packaging your optimization modifications successfully." >> $GITHUB_STEP_SUMMARY
            echo "- **Kernel package flavor:** \`linux-btrfs\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Official Upstream Version:** \`$OFFICIAL_VERSION\`" >> $GITHUB_STEP_SUMMARY
          '
