name: TEST - Custom Kernel Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      latest_tag: ${{ steps.check.outputs.latest_tag }}
    steps:
    - name: Checkout Your Repo
      uses: actions/checkout@v4

    - name: Check GitHub API (FORCED TRUE FOR TEST)
      id: check
      run: |
        LATEST_TAG=$(curl -s https://api.github.com/repos/archlinux/linux/tags | jq -r '.[0].name')
        echo "Latest upstream tag: $LATEST_TAG"
        echo "should_build=true" >> $GITHUB_OUTPUT
        echo "latest_tag=$LATEST_TAG-test" >> $GITHUB_OUTPUT

  build-kernel:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Cache for ccache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: ${{ runner.os }}-kernel-ccache-test
        restore-keys: |
          ${{ runner.os }}-kernel-ccache-

    - name: Run Mock Build inside Arch Container
      run: |
        mkdir -p ${{ github.workspace }}/.ccache
        chmod -R 777 ${{ github.workspace }}/.ccache

        docker run --rm \
          -v ${{ github.workspace }}/.ccache:/home/builder/.cache/ccache \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          archlinux:latest bash -c '
            set -ex
            
            echo "=== Step 1: Bootstrap Dependencies ==="
            pacman -Syu --noconfirm
            pacman -S --noconfirm git base-devel devtools pacman-contrib ccache sudo
            pacman -Scc --noconfirm
            
            echo "=== Step 2: Configure Build User ==="
            useradd -m builder
            echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            chown -R builder:builder /home/builder/.cache/ccache
            chown -R builder:builder /workspace
            
            echo "=== Step 3: MOCKING Build ==="
            sudo -u builder bash << "EOF"
            set -ex
            mkdir -p linux
            
            echo "mock kernel binary data" > linux/linux-btrfs-test.pkg.tar.zst
            echo "mock kernel headers data" > linux/linux-btrfs-headers-test.pkg.tar.zst
            
            echo "pkgver=7.0.0" > linux/PKGBUILD
            echo "pkgrel=1" >> linux/PKGBUILD
        EOF
          '

    - name: Restore Workspace Ownership
      run: |
        # Reclaim ownership from the container builder user
        sudo chown -R $USER:$USER .

    - name: Upload Compiled Packages as Workflow Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: arch-linux-btrfs-packages-test
        path: linux/*.pkg.tar.zst
        if-no-files-found: error

    - name: Save Version State back to Repo
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        echo "${{ needs.check-version.outputs.latest_tag }}" > .last_release
        git add .last_release
        git diff-index --quiet HEAD || git commit -m "Automated TEST: Update tracked kernel tag to ${{ needs.check-version.outputs.latest_tag }}"
        git push

    - name: Create GitHub Release and Upload Packages
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG_NAME: ${{ needs.check-version.outputs.latest_tag }}
      run: |
        echo "=== Create Base Release Entry ==="
        gh release create "$TAG_NAME" \
          --title "TEST Kernel Release $TAG_NAME" \
          --notes "Testing the fixed release upload pipeline with artifacts uploaded first." || true
        
        echo "=== Upload Assets to Release ==="
        gh release upload "$TAG_NAME" linux/*.pkg.tar.zst --clobber

    - name: Log Summary
      run: |
        PKGVER=$(grep -E "^pkgver=" linux/PKGBUILD | cut -d= -f2)
        PKGREL=$(grep -E "^pkgrel=" linux/PKGBUILD | cut -d= -f2)
        OFFICIAL_VERSION="${PKGVER}-${PKGREL}"

        echo "## 🚀 TEST Build Complete" >> $GITHUB_STEP_SUMMARY
        echo "- **Official Upstream Version:** \`$OFFICIAL_VERSION\`" >> $GITHUB_STEP_SUMMARY
